    <circle cx="80" cy="80" r="64" fill="none" stroke="#7acae4" stroke-width="3"/>
    <circle cx="80" cy="80" r="56" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>
  <path d="M 65 25 L 95 25 L 80 35 Z" fill="#7acae4" opacity="0.9"/>
